<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4f46e5">
    <title>MultiLLM Proxy Offline</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4f5ff;
            --panel: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --primary: #4f46e5;
            --secondary: #9333ea;
            --border: rgba(79, 70, 229, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(147, 51, 234, 0.12), transparent 30%),
                radial-gradient(circle at bottom right, rgba(79, 70, 229, 0.15), transparent 35%),
                var(--bg);
        }

        .panel {
            width: min(100%, 520px);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 24px 80px rgba(79, 70, 229, 0.12);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(79, 70, 229, 0.08);
            color: var(--primary);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        h1 {
            margin: 20px 0 12px;
            font-size: clamp(2rem, 4vw, 2.8rem);
            line-height: 1.05;
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.65;
        }

        .actions {
            margin-top: 24px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 140px;
            padding: 12px 16px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 600;
        }

        .primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
        }

        .secondary {
            border: 1px solid rgba(79, 70, 229, 0.18);
            color: var(--text);
            background: #fff;
        }
    </style>
</head>
<body>
    <main class="panel">
        <div class="badge">Offline Mode</div>
        <h1>MultiLLM Proxy is temporarily offline.</h1>
        <p>
            The installed app is still available, but the network connection is unavailable right now.
            Reconnect and retry to reach live provider routes, dashboards, and authenticated pages.
        </p>
        <div class="actions">
            <a class="primary" href="/login">Retry Login</a>
            <a class="secondary" href="/">Open App</a>
        </div>
    </main>
</body>
</html>
