name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - review/**

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock
          python -m pip install pytest ruff mypy bandit pip-audit
      - name: Static secret scan
        run: python scripts/check_static_secrets.py
      - name: Ruff fatal checks
        run: ruff check . --select E9,F63,F7,F82
      - name: Type import checks
        run: >
          mypy --ignore-missing-imports --follow-imports=skip
          --disable-error-code import-untyped
          --disable-error-code var-annotated
          --disable-error-code arg-type
          --disable-error-code assignment
          --disable-error-code operator
          app.py routes services providers streaming
      - name: Bandit security scan
        run: >
          bandit -q --skip B104,B110,B404,B603,B607,B608
          -r app.py config.py error_handlers.py route_helpers.py routes services providers streaming
      - name: Dependency audit
        run: pip-audit -r requirements.lock
      - name: Python tests
        run: python -m pytest -q

  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install Node dependencies
        run: npm ci
      - name: Node audit
        run: npm audit --audit-level=high
      - name: Worker tests
        run: node --test test_cloudflare_worker.mjs
